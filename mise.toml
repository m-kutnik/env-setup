[tools]
bun = "latest"
node = "latest"

[env]
_ = { path = "./node_modules/.bin" }

[tasks]
install = { run = "./scripts/bash/install.sh" }
format = { run = "oxfmt && treefmt", depends = ["sync-format-ignore"] }
sync-format-ignore = { run = "bun scripts/bun/sync-format-ignore.ts" }
brew-extras = { run = "./scripts/bash/homebrew-install-extras.sh" }

[deps]
bun = { auto = true }

[settings]
dotfiles = { root = "dotfiles", default_mode = "symlink" }

[dotfiles]
"~/.config/ghostty" = { source = "dotfiles/ghostty/.config/ghostty" }
"~/.config/zed" = { source = "dotfiles/zed/.config/zed" }
"~/.zsh" = { source = "dotfiles/zsh/.zsh" }
"~/.p10k.zsh" = { source = "dotfiles/zsh/.p10k.zsh" }
"~/.zprofile" = { source = "dotfiles/zsh/.zprofile" }
"~/.zshenv" = { source = "dotfiles/zsh/.zshenv" }
"~/.zshrc" = { source = "dotfiles/zsh/.zshrc" }
