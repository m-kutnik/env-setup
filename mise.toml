[tools]
bun = "latest"
node = "latest"

[env]
_ = { path = "./node_modules/.bin" }

[tasks]
install = { run = "./scripts/bash/install.sh" }
format = { run = "oxfmt && treefmt" }
brew-extras = { run = "./scripts/bash/homebrew-install-extras.sh" }

[deps]
bun = { auto = true }

[settings]
dotfiles = { root = "dotfiles", default_mode = "symlink" }

[dotfiles]
"~/.config/ghostty" = { source = "dotfiles/ghostty/.config/ghostty" }
"~/.config/zed" = { source = "dotfiles/zed/.config/zed" }
